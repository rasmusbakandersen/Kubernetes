apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-config
  namespace: filebrowser
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: filebrowser-config-pv
  resources:
    requests:
      storage: 1Gi
