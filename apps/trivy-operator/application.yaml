apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
spec:
  project: default
  source:
    chart: trivy-operator
    repoURL: https://aquasecurity.github.io/helm-charts/
    targetRevision: 0.27.0
    helm:
      valuesObject:
        trivy:
          ignoreUnfixed: true
          mode: Standalone
          severity: CRITICAL,HIGH,MEDIUM
        operator:
          replicas: 1
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          scanJobResources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 1Gi
          concurrentScanJobsLimit: 2
          vulnerabilityReportsScanner: Trivy
          configAuditReportsScanner: Trivy
          scanJobTTL: "30m"
        serviceMonitor:
          enabled: true
          labels: {}
        excludeNamespaces: ""
        targetNamespaces: ""
        configAuditScannerEnabled: true
        rbacAssessmentScannerEnabled: true
        compliance:
          cron: "0 6 * * *"
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
