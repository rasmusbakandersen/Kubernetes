apiVersion: apps/v1
kind: Deployment
metadata:
  name: vikunja-db
  namespace: vikunja
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vikunja-db
  template:
    metadata:
      labels:
        app: vikunja-db
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: vikunja
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vikunja-secrets
                  key: VIKUNJA_DB_PASSWORD
            - name: POSTGRES_DB
              value: vikunja
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              memory: 256Mi
              cpu: "500m"
            requests:
              memory: 128Mi
              cpu: "10m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vikunja-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: vikunja-db
  namespace: vikunja
spec:
  selector:
    app: vikunja-db
  ports:
    - port: 5432
      targetPort: 5432
