apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
    spec:
      enableServiceLinks: false
      containers:
        - name: wallabag
          image: wallabag/wallabag:latest
          ports:
            - containerPort: 80
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: SYMFONY__ENV__DATABASE_DRIVER
              value: pdo_mysql
            - name: SYMFONY__ENV__DATABASE_HOST
              value: wallabag-db
            - name: SYMFONY__ENV__DATABASE_PORT
              value: "3306"
            - name: SYMFONY__ENV__DATABASE_NAME
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_USER
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-secrets
                  key: WALLABAG_DB_PASSWORD
            - name: SYMFONY__ENV__DATABASE_CHARSET
              value: utf8mb4
            - name: SYMFONY__ENV__REDIS_HOST
              value: wallabag-redis
            - name: SYMFONY__ENV__DOMAIN_NAME
              value: https://wallabag.sanxer.dk
            - name: SYMFONY__ENV__SERVER_NAME
              value: Wallabag
            - name: SYMFONY__ENV__FOSUSER_REGISTRATION
              value: "false"
            - name: SYMFONY__ENV__FOSUSER_CONFIRMATION
              value: "false"
            - name: SYMFONY__ENV__MAILER_DSN
              value: smtp://127.0.0.1:25
            - name: SYMFONY__ENV__FROM_EMAIL
              value: wallabag@sanxer.dk
          volumeMounts:
            - name: data
              mountPath: /var/www/wallabag/web/assets/images
              subPath: images
            - name: data
              mountPath: /var/www/wallabag/data
              subPath: data
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 256Mi
              cpu: "10m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wallabag-data
